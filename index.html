    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Courier+Prime:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1a1a0e;
        --paper: #f5f0e8;
        --moss: #4a6741;
        --bark: #8b6f47;
        --cream: #ede8d8;
        --rule: #c8bfa8;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--paper);
        color: var(--ink);
        font-family: "Courier Prime", monospace;
        min-height: 100vh;
        padding: 2rem 1rem 4rem;
      }

      .page {
        max-width: 640px;
        margin: 0 auto;
        position: relative;
      }

      /* ── Lang switch ── */
      .lang-switch {
        display: flex;
        justify-content: flex-end;
        gap: 0.2rem;
        margin-bottom: 1rem;
      }

      .lang-btn {
        font-family: "Courier Prime", monospace;
        font-size: 0.72rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        border: 1px solid var(--rule);
        background: transparent;
        color: var(--bark);
        padding: 0.25rem 0.6rem;
        cursor: pointer;
        border-radius: 1px;
        transition: all 0.15s;
      }

      .lang-btn.active {
        border-color: var(--moss);
        color: var(--moss);
        font-weight: 700;
      }

      .lang-btn:hover:not(.active) {
        border-color: var(--bark);
        color: var(--ink);
      }

      /* ── Header ── */
      header {
        text-align: center;
        margin-bottom: 2.5rem;
        padding-top: 0.5rem;
      }

      header h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(2.4rem, 8vw, 3.6rem);
        font-weight: 700;
        line-height: 1;
        color: var(--moss);
      }

      header .sub {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-size: 1rem;
        color: var(--bark);
        margin-top: 0.4rem;
      }

      header .dateline {
        font-size: 0.78rem;
        color: var(--bark);
        margin-top: 0.6rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      /* ── Rules ── */
      .rules {
        border: 1.5px solid var(--moss);
        border-radius: 2px;
        padding: 0.9rem 1.2rem;
        margin-bottom: 2rem;
        font-size: 0.82rem;
        line-height: 1.7;
        background: var(--cream);
      }

      .rules strong {
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--moss);
        display: block;
        margin-bottom: 0.3rem;
      }

      /* ── Grid ── */
      .grid-wrap {
        margin-bottom: 1.5rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        border-top: 2px solid var(--ink);
        border-left: 2px solid var(--ink);
      }

      .cell {
        border-right: 2px solid var(--ink);
        border-bottom: 2px solid var(--ink);
        aspect-ratio: 1 / 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0.6rem;
        text-align: center;
        font-size: clamp(0.65rem, 2.2vw, 0.82rem);
        line-height: 1.35;
        cursor: pointer;
        user-select: none;
        position: relative;
        transition: background 0.15s;
        background: var(--paper);
      }

      .cell:hover {
        background: var(--cream);
      }
      .cell.found {
        background: var(--moss);
        color: var(--paper);
      }
      .cell.found::after {
        content: "✓";
        position: absolute;
        top: 4px;
        right: 6px;
        font-size: 0.7rem;
        opacity: 0.7;
      }
      .cell.winner {
        background: var(--bark);
        color: var(--paper);
      }

      /* ── Win banner ── */
      .win-banner {
        display: none;
        text-align: center;
        border: 2px solid var(--moss);
        background: var(--cream);
        padding: 1rem;
        margin-bottom: 2rem;
        animation: fadeIn 0.4s ease;
      }
      .win-banner.show {
        display: block;
      }
      .win-banner p {
        font-family: "Playfair Display", serif;
        font-size: 1.3rem;
        color: var(--moss);
      }
      .win-banner small {
        font-size: 0.78rem;
        color: var(--bark);
      }

      /* ── Fields ── */
      .fields {
        padding: 0.8rem 0;
        margin-bottom: 2rem;
        font-size: 0.82rem;
        padding-bottom: 16px;
      }

      .field-row {
        display: flex;
        align-items: baseline;
        gap: 0.5rem;
        padding: 0.35rem 0;
      }

      .field-row label {
        min-width: 9rem;
        color: var(--bark);
        font-size: 0.75rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        flex-shrink: 0;
      }

      .field-line {
        border: none;
        border-bottom: 1px solid var(--rule);
        background: transparent;
        font-family: "Courier Prime", monospace;
        font-size: 0.85rem;
        color: var(--ink);
        padding: 0.1rem 0.2rem;
        outline: none;
        width: 100%;
      }
      .field-line::placeholder {
        color: var(--rule);
      }

      /* ── Notes ── */
      .notes-label {
        font-size: 0.72rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--bark);
        margin-bottom: 0.4rem;
      }

      .notes-lines {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        margin-bottom: 2rem;
      }

      .note-line {
        border: none;
        border-bottom: 1px solid var(--rule);
        background: transparent;
        font-family: "Courier Prime", monospace;
        font-size: 0.85rem;
        color: var(--ink);
        padding: 0.1rem 0.2rem;
        outline: none;
        width: 100%;
      }

      /* ── Buttons ── */
      .actions {
        display: flex;
        gap: 0.8rem;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 2rem;
      }

      button {
        font-family: "Courier Prime", monospace;
        font-size: 0.82rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border: 1.5px solid var(--ink);
        background: transparent;
        color: var(--ink);
        padding: 0.55rem 1.4rem;
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s;
        border-radius: 1px;
      }
      button:hover {
        background: var(--moss);
        color: var(--paper);
        border-color: var(--moss);
      }
      button.primary {
        background: var(--moss);
        color: var(--paper);
        border-color: var(--moss);
      }
      button.primary:hover {
        background: var(--ink);
        color: var(--paper);
        border-color: var(--ink);
      }

      /* ── Print ── */
      @media print {
        @page {
          size: A4 portrait;
          margin: 12mm 14mm;
        }

        html,
        body {
          height: 100%;
        }

        body {
          background: white;
          background-image: none;
          padding: 0;
          font-size: 11pt;
        }

        .page {
          max-width: 100%;
          height: 100%;
          display: flex;
          flex-direction: column;
        }

        .lang-switch {
          display: none;
        }

        header {
          margin-bottom: 6mm;
          padding-top: 0;
        }
        header h1 {
          font-size: 2rem;
        }
        header .sub {
          font-size: 0.8rem;
        }
        header .dateline {
          font-size: 0.65rem;
          margin-top: 2px;
        }

        .rules {
          padding: 4px 8px;
          margin-bottom: 5mm;
          font-size: 0.72rem;
          line-height: 1.5;
        }

        .grid-wrap {
          margin-bottom: 5mm;
          flex-shrink: 0;
        }
        .grid {
          width: 148mm;
          height: 148mm;
          margin: 0 auto;
        }

        .cell {
          aspect-ratio: unset;
          font-size: 0.72rem;
          padding: 4px;
          cursor: default;
          background: white !important;
          color: black !important;
        }
        .cell:hover {
          background: white;
        }
        .cell.found::after {
          display: none;
        }

        .win-banner {
          display: none !important;
        }

        .fields {
          margin-bottom: 6mm;
          padding: 4px 0;
        }
        .field-row {
          padding: 4px 0;
        }
        .field-row label {
          font-size: 0.68rem;
          min-width: 7rem;
        }
        .field-line {
          border-bottom: 0.5pt solid #555;
          min-width: 0;
          width: 100%;
          padding-bottom: 6px;
        }

        .notes-label {
          font-size: 0.65rem;
          margin-bottom: 2px;
        }
        .notes-lines {
          gap: 5mm;
          margin-bottom: 0;
        }
        .note-line {
          border-bottom: 0.5pt solid #aaa;
        }

        .actions {
          display: none;
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>

      // ── State ─────────────────────────────────────────────────────────────────────
      let lang = "en";
      let found = new Array(9).fill(false);
      let currentItems = [];

      // ── Helpers ───────────────────────────────────────────────────────────────────
      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function checkWin() {
        for (let r = 0; r < 3; r++)
          if ([0, 1, 2].every((c) => found[r * 3 + c]))
            return [r * 3, r * 3 + 1, r * 3 + 2];
        for (let c = 0; c < 3; c++)
          if ([0, 1, 2].every((r) => found[r * 3 + c]))
            return [c, c + 3, c + 6];
        return null;
      }

      // ── UI ────────────────────────────────────────────────────────────────────────
      function applyLang() {
        const t = LANG[lang];
        document.documentElement.lang = lang;
        document.getElementById("t-title").textContent = t.title;
        document.getElementById("t-sub").textContent = t.sub;
        document.getElementById("t-rules-head").textContent = t.rulesHead;
        document.getElementById("t-rules-body").innerHTML = t.rulesBody;
        document.getElementById("t-win-p").textContent = t.winP;
        document.getElementById("t-win-small").textContent = t.winSmall;
        document.getElementById("t-label-name").textContent = t.labelName;
        document.getElementById("t-label-steps").textContent = t.labelSteps;
        document.getElementById("t-notes").textContent = t.notes;
        document.getElementById("t-btn-new").textContent = t.btnNew;
        document.getElementById("t-btn-print").textContent = t.btnPrint;
        document.title = t.title + " 🌿";

        // dateline
        document.getElementById("dateline").textContent =
          new Date().toLocaleDateString(t.locale, {
            weekday: "long",
            day: "numeric",
            month: "long",
            year: "numeric",
          });

        // lang buttons
        document
          .querySelectorAll(".lang-btn")
          .forEach((b) =>
            b.classList.toggle(
              "active",
              b.textContent.trim().toLowerCase() === lang,
            ),
          );
      }

      function setLang(l) {
        lang = l;
        applyLang();
        newCard();
      }

      function render() {
        const grid = document.getElementById("grid");
        const banner = document.getElementById("winBanner");
        const win = checkWin();

        grid.innerHTML = "";
        currentItems.forEach((item, i) => {
          const cell = document.createElement("div");
          cell.className =
            "cell" +
            (found[i] ? " found" : "") +
            (win && win.includes(i) ? " winner" : "");
          cell.textContent = item;
          cell.onclick = () => {
            found[i] = !found[i];
            render();
          };
          grid.appendChild(cell);
        });

        if (win) banner.classList.add("show");
        else banner.classList.remove("show");
      }

      function newCard() {
        currentItems = shuffle(ITEMS[lang]).slice(0, 9);
        found = new Array(9).fill(false);
        document
          .querySelectorAll(".field-line, .note-line")
          .forEach((el) => (el.value = ""));
        render();
      }

      // ── Init ──────────────────────────────────────────────────────────────────────
      applyLang();
      newCard();
    </script>
